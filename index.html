<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ Coordinate Converter</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app-shell">
    <h2>Latitude / Longitude → NZTM2000</h2>

    <div class="button-row">
        <button id="gpsButton" onclick="inputCurrentGPS()">Use Current GPS Coordinates</button>
        <button id="installButton" onclick="promptInstall()">Install App</button>
    </div>

    <section class="input-panel">
        <h3>Top Input</h3>

        <label for="lat" id="latLabel">Latitude:</label>
        <input id="lat">

        <label for="lon" id="lonLabel">Longitude:</label>
        <input id="lon">

        <div class="mode-switch" aria-label="Top input format switch">
            <button id="topModeDd" onclick="setTopDisplayMode('DD')">Decimal Degrees</button>
            <button id="topModeDms" onclick="setTopDisplayMode('DMS')">Degrees Minutes Seconds</button>
        </div>
    </section>

    <div class="button-row">
        <button id="convertTopButton" onclick="convertTopToBottom()">Convert Top → Bottom</button>
        <button id="convertBottomButton" onclick="convertBottomToTop()">Convert Bottom → Top</button>
    </div>

    <section class="input-panel">
        <h3>Bottom Input</h3>

        <label for="result1" id="resultLabel1">Easting:</label>
        <input id="result1">

        <label for="result2" id="resultLabel2">Northing:</label>
        <input id="result2">

        <div class="mode-switch" aria-label="Bottom input format switch">
            <button id="bottomModeNztm" onclick="setBottomDisplayMode('NZTM')">NZTM</button>
            <button id="bottomModeTopo50" onclick="setBottomDisplayMode('TOPO50')">NZTopo50</button>
        </div>
    </section>

    <div id="detailText"></div>
    <div id="installStatus"></div>
</main>
<script src="proj4.js"></script>
<script src="script.js"></script>

</body>
</html>
